<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <form action="" id="popup">
      <input
        type="text"
        name="server_name"
        placeholder="Server Name"
        required
      />
      <input type="checkbox" name="accept_eula" id="eula" required />
      <label for="eula">Accept Minecraft's EULA</label>
      <input type="submit" value="Create Server" />
    </form>
    <section>
      <div>
        <button onclick="open()">Create server</button>
        <input type="text" placeholder="Search Servers..." />
      </div>
    </section>
    <script src="./index.js"></script>
  </body>
</html>
